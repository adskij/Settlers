services:
  settlers:
    build: .
    image: settlers:latest
    container_name: settlers
    ports:
      - "${PORT:-4000}:4000"
    environment:
      # IMPORTANT: set a long random secret in a .env file or your shell.
      JWT_SECRET: "${JWT_SECRET:-change-me-please-set-a-real-secret}"
      PORT: "4000"
      DATABASE_PATH: "/data/settlers.db"
    volumes:
      - settlers-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  settlers-data:

name: Deploy to Azure

# Builds the container, pushes it to GHCR, then deploys/updates the Azure
# App Service via Bicep using OIDC (no long-lived Azure secrets in GitHub).
#
# Required GitHub config (set once by infra/azure-setup.sh):
#   Secrets:   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, JWT_SECRET
#   Variables: AZURE_RESOURCE_GROUP, AZURE_WEBAPP_NAME, AZURE_LOCATION

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: settlers

permissions:
  contents: read
  packages: write
  id-token: write # required for Azure OIDC login

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image ref
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --template-file infra/main.bicep \
              --parameters \
                appName="${{ vars.AZURE_WEBAPP_NAME }}" \
                location="${{ vars.AZURE_LOCATION }}" \
                containerImage="${{ needs.build-and-push.outputs.image }}:${{ github.sha }}" \
                jwtSecret="${{ secrets.JWT_SECRET }}"

      - name: Restart web app to pull the new image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp restart \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --name "${{ vars.AZURE_WEBAPP_NAME }}"
            echo "Deployed: https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
